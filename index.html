<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Abdelbaset | Connect</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using a more robust gradient for all devices */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-attachment: fixed;
            padding: 20px;
            color: var(--text);
        }

        .profile-container {
            width: 100%;
            max-width: 400px; /* Slightly tighter for a cleaner look */
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border: 3px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: block;
            padding: 14px;
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile tap */
        }

        /* Hover & Active states */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .link-card:active {
            transform: scale(0.98); /* Tactile feel on press */
        }

        /* Platform specific hover colors */
        .whatsapp:hover { border-color: #25D366; color: #25D366; }
        .facebook:hover { border-color: #1877F2; color: #1877F2; }
        .instagram:hover { border-color: #E4405F; color: #E4405F; }
        .website:hover { border-color: #00d2ff; color: #00d2ff; }
        .phone:hover { border-color: #ff9f43; color: #ff9f43; }

        /* Mobile Optimization for very small screens */
        @media (max-width: 360px) {
            .profile-container {
                padding: 30px 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .avatar {
                width: 75px;
                height: 75px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="avatar">AA</div>
    <h1>Ahmed Abdelbaset</h1>
    <p class="tagline">Connect with me</p>

    <div class="links-wrapper">
        <a href="https://wa.me/201032383037" class="link-card whatsapp">WhatsApp</a>
        <a href="https://www.facebook.com/share/18PcKJuY7K/" class="link-card facebook">Facebook</a>
        <a href="https://www.instagram.com/eng.ahmedabdelbast" class="link-card instagram">Instagram</a>
        <a href="https://ahmed-abdelbast.my-style.in/?i=1" class="link-card website">Official Website</a>
        <a href="tel:01024633084" class="link-card phone">Call Me</a>
    </div>
</div>

</body>
</html>
